name: Trend Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  run-trend-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full trend pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          GNEWS_LANG: ${{ vars.GNEWS_LANG || 'en' }}
          GNEWS_COUNTRY: ${{ vars.GNEWS_COUNTRY || 'us' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          USE_SUPABASE: ${{ vars.USE_SUPABASE || 'false' }}
        run: python jobs/collect_signals.py

      - name: Upload local signal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-signal-data
          path: |
            signals/
            .logs/
          if-no-files-found: ignore
