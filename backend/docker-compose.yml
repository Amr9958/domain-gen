services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: domain_intel
      POSTGRES_USER: domain_intel
      POSTGRES_PASSWORD: domain_intel
    ports:
      - "5432:5432"
    volumes:
      - domain_intel_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domain_intel -d domain_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  domain_intel_postgres:
