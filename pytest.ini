[pytest]
addopts =
    --strict-config
    --strict-markers
    --durations=10
    --durations-min=0.01
markers =
    performance: local smoke checks for critical-path runtime regressions
    live_openrouter: opt-in smoke checks that call the configured OpenRouter model
filterwarnings =
    ignore:.*enablePackrat.*:DeprecationWarning:pyiceberg.*
    ignore:.*escChar.*:DeprecationWarning:pyiceberg.*
    ignore:.*unquoteResults.*:DeprecationWarning:pyiceberg.*
    ignore:.*model_validator.*:DeprecationWarning:pyiceberg.*
    ignore:.*model_validator.*:DeprecationWarning:google.genai.types
    ignore:urllib3 v2 only supports OpenSSL.*:Warning:urllib3.*
    ignore:You are using a Python version 3.9 past its end of life.*:FutureWarning:google.*
